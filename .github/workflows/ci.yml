name: "CI"

on:
  push:
  pull_request:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  just:
    name: "Just"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
      - name: "Install uv"
        uses: "astral-sh/setup-uv@v8.1.0"
        with:
          enable-cache: true
      - name: "Run Just"
        run: "uv run -- just ci"
        env:
          UV_LOCKED: "true"
          RUFF_OUTPUT_FORMAT: "github"
